app = "foundation-software"
primary_region = "bom"

[build]

[env]
  PORT = "4000"
  DATA_DIR = "/data"
  NODE_ENV = "production"

[mounts]
  source = "foundation_data"
  destination = "/data"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
